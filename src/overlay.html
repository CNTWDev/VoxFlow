<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vox Flow Status</title>
  <style>
    :root {
      --glass: rgba(20, 18, 14, .84);
      --text: #f8f0df;
      --muted: rgba(248, 240, 223, .58);
      --accent: #f2b84b;
      --green: #61d394;
      --blue: #72a8ff;
      --red: #ff6b57;
      --audio-level: 0;
      --bar-1: 7px;
      --bar-2: 9px;
      --bar-3: 11px;
      --bar-4: 9px;
      --bar-5: 7px;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }

    body {
      display: grid;
      place-items: center;
      padding: 0;
    }

    .pill {
      width: 278px;
      min-height: 58px;
      display: grid;
      grid-template-columns: 32px 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border: 0;
      border-radius: 999px;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 22%, rgba(242, 184, 75, .18), transparent 34%),
        linear-gradient(135deg, rgba(34, 30, 23, .9), var(--glass));
      box-shadow: none;
      backdrop-filter: blur(18px);
      transform: translateY(10px) scale(.98);
      opacity: 0;
      transition: opacity .18s ease, transform .22s cubic-bezier(.2,.8,.2,1);
    }

    .pill.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .orb {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(242, 184, 75, .14);
      color: var(--accent);
      position: relative;
    }

    .orb::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: inherit;
      border: 1px solid currentColor;
      opacity: .24;
    }

    .status-recording .orb {
      color: var(--red);
      box-shadow: 0 0 0 calc(var(--audio-level) * 10px) rgba(255, 107, 87, .18);
      transform: scale(calc(1 + var(--audio-level) * .12));
      transition: box-shadow 90ms linear, transform 90ms linear;
    }

    .status-processing .orb { color: var(--blue); }
    .status-injecting .orb, .status-success .orb { color: var(--green); }
    .status-error .orb { color: var(--red); }

    .glyph {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 12px currentColor;
    }

    .copy {
      min-width: 0;
    }

    .title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail {
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meter {
      display: flex;
      align-items: end;
      gap: 2px;
      height: 20px;
    }

    .bar {
      width: 3px;
      border-radius: 999px;
      background: var(--accent);
      opacity: .58;
      transform-origin: bottom;
      animation: level 900ms ease-in-out infinite;
    }

    .status-recording .bar {
      animation: none;
      background: var(--red);
      opacity: calc(.36 + var(--audio-level) * .58);
      transition: height 70ms linear, opacity 70ms linear;
    }

    .status-recording .bar:nth-child(1) { height: var(--bar-1); }
    .status-recording .bar:nth-child(2) { height: var(--bar-2); }
    .status-recording .bar:nth-child(3) { height: var(--bar-3); }
    .status-recording .bar:nth-child(4) { height: var(--bar-4); }
    .status-recording .bar:nth-child(5) { height: var(--bar-5); }

    .bar:nth-child(2) { animation-delay: 90ms; }
    .bar:nth-child(3) { animation-delay: 180ms; }
    .bar:nth-child(4) { animation-delay: 270ms; }
    .bar:nth-child(5) { animation-delay: 360ms; }

    .status-processing .bar,
    .status-injecting .bar {
      background: var(--blue);
      animation: sweep 900ms ease-in-out infinite;
    }

    .status-success .bar {
      background: var(--green);
      animation: none;
      height: 18px;
    }

    .status-error .bar {
      background: var(--red);
      animation: none;
      height: 10px;
    }

    @keyframes breathe {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 87, .22); }
      50% { box-shadow: 0 0 0 8px rgba(255, 107, 87, 0); }
    }

    @keyframes level {
      0%, 100% { height: 7px; }
      50% { height: 18px; }
    }

    @keyframes sweep {
      0%, 100% { height: 7px; opacity: .35; }
      50% { height: 17px; opacity: .9; }
    }
  </style>
</head>
<body>
  <div id="pill" class="pill" aria-live="polite">
    <div class="orb"><div class="glyph"></div></div>
    <div class="copy">
      <div id="title" class="title">Vox Flow</div>
      <div id="detail" class="detail">Ready when you are.</div>
    </div>
    <div class="meter" aria-hidden="true">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;
    const pill = document.getElementById('pill');
    const title = document.getElementById('title');
    const detail = document.getElementById('detail');
    const bars = [...document.querySelectorAll('.bar')];
    let hideTimer = null;
    let stickyUntil = 0;
    let levelDecayTimer = null;

    const copy = {
      Recording: ['正在聆听', '松开 Fn，我会整理并输入到当前光标位置'],
      Processing: ['正在整理', '识别语音，并转换成可直接发送的文字'],
      Injecting: ['正在输入', '马上填入当前应用的焦点文本框'],
      Success: ['已输入', '内容已经放到当前光标位置'],
      Error: ['没有完成', '请检查麦克风、权限或服务配置'],
    };

    function setOverlay(kind, message) {
      clearTimeout(hideTimer);
      if (kind !== 'Recording') setAudioLevel(0, 0);
      if (kind === 'Success' || kind === 'Error') {
        stickyUntil = Date.now() + (kind === 'Success' ? 1200 : 2500);
      } else {
        stickyUntil = 0;
      }
      const [main, sub] = copy[kind] || copy.Processing;
      pill.className = `pill visible status-${kind.toLowerCase()}`;
      title.textContent = main;
      detail.textContent = message || sub;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function setAudioLevel(rms = 0, peak = 0) {
      const level = clamp(Math.max(rms * 18, peak * 4), 0, 1);
      const shape = [0.58, 0.82, 1, 0.74, 0.52];
      document.documentElement.style.setProperty('--audio-level', level.toFixed(3));
      bars.forEach((_, index) => {
        const wobble = Math.sin(Date.now() / 95 + index * 1.7) * 2;
        const height = 5 + level * 17 * shape[index] + wobble * level;
        document.documentElement.style.setProperty(`--bar-${index + 1}`, `${clamp(height, 5, 22).toFixed(1)}px`);
      });
      clearTimeout(levelDecayTimer);
      levelDecayTimer = setTimeout(() => setAudioLevel(0, 0), 180);
    }

    function hideSoon(delay = 1200) {
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        pill.className = 'pill';
      }, delay);
    }

    function normalizeState(state) {
      if (typeof state === 'string') return state;
      return state?.state || 'Idle';
    }

    function handleState(state) {
      if (state === 'Recording' || state === 'Processing' || state === 'Injecting') {
        setOverlay(state);
      } else if (state === 'Idle') {
        if (Date.now() < stickyUntil) return;
        hideSoon(350);
      }
    }

    async function syncState() {
      try {
        handleState(normalizeState(await invoke('get_state')));
      } catch (_) {}
    }

    listen('vox://event', event => {
      const data = event.payload;
      if (!data || !data.type) return;

      if (data.type === 'StateChanged') {
        handleState(normalizeState(data.state));
      } else if (data.type === 'AudioLevel') {
        setAudioLevel(data.rms, data.peak);
      } else if (data.type === 'Transcription') {
        setOverlay('Success');
        hideSoon(1300);
      } else if (data.type === 'Error') {
        setOverlay('Error', data.message);
        hideSoon(2600);
      }
    }).catch(console.error);

    syncState();
    setInterval(syncState, 700);
  </script>
</body>
</html>
